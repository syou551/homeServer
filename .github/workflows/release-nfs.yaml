name: release-nfs-image
on:
  push:
    branches:
      - main
    pull_request:
      - main

jobs:
  nfs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: login GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: syou551
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./DockerImage/nfs
          file: ./DockerImage/nfs/Dockerfile
          tags: |
            ghcr.io/syou551/nfs:v1.0.0-${{ github.sha }}-${{ github.run_number }}
            ghcr.io/syou551/nfs:latest