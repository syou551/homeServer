apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: nfs-server
  name: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      nodeName: "sophy"
      containers:
      - name: nfs-server
        image: "ghcr.io/syou551/nfs:latest"
        securityContext:
          privileged: true
        ports:
        - containerPort: 2049
        volumeMounts:
        - mountPath: "/exports"
          name: exports
      volumes:
        - name: exports
          hostPath:
            path: /data
            type: DirectoryOrCreate
