apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-ingress-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.strrl.dev
    chart: cloudflare-tunnel-ingress-controller
    targetRevision: 0.0.12
    helm:
      valuesObject:
        cloudflare:
          apiToken: hNsPZS4gb6PYO4E-OiJ9cZoL-uaHE1RocsIPA_qN
          accountId: 90ca08cc7f80618294724a204947fb93
          tunnelName: ingress-cf

  destination:
